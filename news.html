<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News - The Voynich Times</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; overflow-x: hidden; }
   
    #background-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75) contrast(1.05);
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.68);
      z-index: -1;
    }
    .news-card {
      transition: all 0.3s ease;
      background: rgba(31, 41, 55, 0.95);
      border: 1px solid #4b5563;
      border-radius: 16px;
      overflow: hidden;
    }
    .news-card:hover {
      transform: scale(1.02) translateY(-2px);
      border-color: #10b981;
    }
  </style>
  <link rel="canonical" href="https://voynichtimes.com/news.html" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <!-- Deferred video background -->
  <video id="background-video" loop muted playsinline poster="voynich-home-art.jpg" preload="none">
    <source src="voynich-flip.webm" type="video/webm">
    <source src="voynich-flip.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <!-- Clean modern nav -->
  <nav class="bg-gray-800/90 backdrop-blur-md p-4 sticky top-0 shadow z-50">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold hover:text-emerald-400 transition-colors">The Voynich Times</a>
      
      <div class="hidden md:flex items-center space-x-8 text-sm">
        <a href="index.html" class="text-gray-300 hover:text-white transition-colors">Home</a>
        <a href="news.html" class="text-gray-300 hover:text-white transition-colors">News</a>
        <a href="database.html" class="text-gray-300 hover:text-white transition-colors">Full Database</a>
        <a href="/wunderkammer/" class="text-gray-300 hover:text-white transition-colors">Wunderkammer</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-8">News</h1>
    <div id="news-container" class="space-y-6"></div>
  </div>

  <!-- Amazon disclaimer at bottom -->
  <div class="max-w-screen-2xl mx-auto px-8 py-12 text-center text-gray-400 text-sm border-t border-gray-700">
    All links lead to their original sources. Amazon links are affiliate links that help support The Voynich Times at no extra cost to you.
  </div>

  <!-- Version indicator -->
  <div class="fixed bottom-4 right-4 text-[10px] text-gray-400 bg-black/70 px-2 py-px rounded z-50">
    v0423-dates
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";
      const newsData = await loadCSV(newsCSV);
      const dateSorter = (a, b) => new Date(b.Date) - new Date(a.Date);

      const recentNews = [...newsData].sort(dateSorter);
      const container = document.getElementById('news-container');

      recentNews.forEach(item => {
        const div = document.createElement('div');
        div.className = 'news-card p-6 flex gap-6';
        div.innerHTML = `
          ${item.Image ? `<img src="${item.Image}" alt="" class="w-24 h-24 object-cover rounded-xl flex-shrink-0">` : ''}
          <div class="flex-1">
            <a href="${item.URL || '#'}" target="_blank" rel="noopener" class="block hover:text-emerald-300 text-xl font-medium">
              ${item.Title || 'Untitled'}
            </a>
            <p class="text-gray-300 mt-2 line-clamp-3">${item.Description || ''}</p>
            <div class="flex justify-between items-end mt-4">
              <div class="card-date">(${item.Date || ''})</div>
              <a href="${item.URL || '#'}" target="_blank" rel="noopener" class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-1">
                Read full article →
              </a>
            </div>
          </div>
        `;
        container.appendChild(div);
      });

      // Start video after data loads
      const video = document.getElementById('background-video');
      if (video) video.play();
    });
  </script>
</body>
</html>
