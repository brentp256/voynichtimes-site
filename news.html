<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voynich Times - News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; }
    .news-item { transition: all 0.2s ease; }
    .news-item:hover { background-color: #1f2937; transform: translateX(4px); }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 p-4 sticky top-0 shadow">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">News / Wunderkammer</h2>
    
    <!-- VERSION BANNER -->
    <div class="bg-emerald-600 text-white text-center py-2 text-sm font-medium mb-8 rounded-xl">
      v0423g — Auto-generated summaries via Worker
    </div>

    <div id="news-container" class="space-y-8"></div>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log("🚀 v0423g — Auto-generated summaries via Worker");

      const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";
      const summarizerUrl = "https://shvoynich-news-summarizer.brentp256.workers.dev";

      const data = await loadCSV(newsCSV);
      const container = document.getElementById('news-container');

      // Sort newest first
      data.sort((a, b) => new Date(b.Date) - new Date(a.Date));

      for (const item of data) {
        const date = item.Date || '';
        const title = item.Title || 'Untitled';
        const url = item.URL || '#';

        let excerpt = "Loading summary...";
        try {
          const res = await fetch(`${summarizerUrl}?url=${encodeURIComponent(url)}`);
          const json = await res.json();
          excerpt = json.excerpt || "No summary available.";
        } catch (e) {
          excerpt = "Could not load summary.";
        }

        const div = document.createElement('div');
        div.className = 'news-item bg-gray-800 p-6 rounded-2xl border border-gray-700 hover:border-emerald-500';
        div.innerHTML = `
          <div class="flex gap-6">
            <div class="text-emerald-400 font-mono text-sm pt-1 w-28 shrink-0">${date}</div>
            <div class="flex-1">
              <a href="${url}" target="_blank" rel="noopener"
                 class="block text-2xl font-semibold leading-tight hover:text-emerald-300 transition-colors">
                ${title}
              </a>
              <p class="text-gray-400 mt-3 text-base leading-relaxed">${excerpt}</p>
            </div>
          </div>
        `;
        container.appendChild(div);
      }

      if (data.length === 0) {
        container.innerHTML = `<p class="text-gray-400 text-center py-12">No news items yet.</p>`;
      }
    });
  </script>
</body>
</html>
