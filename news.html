<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Voynich Times - News</title>
  
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MFDQCDM28S"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MFDQCDM28S');
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen overflow-x-hidden">
  
  <!-- Static background image (fast loading) -->
  <div id="background-image" 
       style="position:fixed; top:0; left:0; width:100%; height:100%; 
              background-image: url('voynich-home-art.jpg'); 
              background-size: cover; background-position: center; 
              z-index:-2; filter:brightness(0.75) contrast(1.05);">
  </div>
  
  <div class="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.68); z-index:-1;"></div>

  <!-- Navigation -->
  <nav class="bg-gray-800 p-4 sticky top-0 shadow z-50">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">The Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6 pt-12">
    <div class="title-box mx-auto text-center">
      <h1 class="text-5xl font-bold tracking-tight">Latest News</h1>
    </div>

    <div id="news-container" class="space-y-6 mt-12"></div>
  </div>

  <!-- Amazon disclaimer footer -->
  <footer class="mt-auto py-8 text-center text-sm text-gray-400 border-t border-gray-700">
    <div class="max-w-screen-2xl mx-auto px-6">
      <p>As an Amazon Associate I earn from qualifying purchases.</p>
      <p class="mt-2 text-xs">v0428 — Updated April 28, 2026</p>
    </div>
  </footer>

  <!-- Scripts at bottom -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <script>
    tailwind.config = { content: ["./**/*.html"] };

    const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";

    async function loadCSV(url) {
      const cacheBuster = `&t=${Date.now()}`;
      const response = await fetch(url + cacheBuster);
      const text = await response.text();
      return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    const dateSorter = (a, b) => new Date(b.Date) - new Date(a.Date);

    async function init() {
      const newsData = await loadCSV(newsCSV);
      const sortedNews = [...newsData].sort(dateSorter);

      const container = document.getElementById('news-container');
      sortedNews.forEach(item => {
        const div = document.createElement('div');
        div.className = 'news-item bg-gray-800 p-6 rounded-2xl border border-gray-700 hover:border-emerald-500 flex gap-6';
        div.innerHTML = `
          ${item.Image ? `<img src="${item.Image}" class="article-image w-36 h-36 object-cover rounded-xl flex-shrink-0" alt="">` : `<div class="placeholder w-36 h-36 bg-gray-700 rounded-xl flex items-center justify-center text-4xl flex-shrink-0">📜</div>`}
          <div class="flex-1">
            <div class="flex justify-between items-start">
              <a href="${item.URL}" target="_blank" rel="noopener" class="block text-2xl font-semibold leading-tight hover:text-emerald-300 flex-1">
                ${item.Title}
              </a>
              <div class="text-emerald-400 font-mono text-sm ml-6 shrink-0">${item.Date}</div>
            </div>
            ${item.Description ? `<p class="text-gray-400 mt-4 text-base leading-relaxed">${item.Description}</p>` : ''}
            <div class="mt-6 flex justify-end">
              <a href="${item.URL}" target="_blank" rel="noopener" class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-1">
                Read full article →
              </a>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.onload = init;
  </script>
</body>
</html>
