<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Voynich Times - News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; }
    .news-item { transition: all 0.2s ease; }
    .news-item:hover { background-color: #1f2937; transform: translateX(4px); }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 p-4 sticky top-0 shadow">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">The Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">News</h2>
    
    <div id="news-container" class="space-y-6"></div>

    <!-- DISCLAIMER -->
    <div class="mt-16 text-center text-xs text-gray-500 max-w-md mx-auto">
      All links lead to their original sources. 
      Amazon links are affiliate links that help support The Voynich Times at no extra cost to you.
    </div>
  </div>

  <!-- Tiny version indicator -->
  <div class="fixed bottom-4 right-4 text-[10px] text-gray-600 bg-gray-900/70 px-2 py-px rounded">
    v0423q
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log("🚀 v0423q — Minimal stable news page");

      const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";

      const data = await loadCSV(newsCSV);
      const container = document.getElementById('news-container');

      // Sort newest first
      data.sort((a, b) => new Date(b.Date) - new Date(a.Date));

      data.forEach(item => {
        const date = item.Date || '';
        const title = item.Title || 'Untitled';
        const url = item.URL || '#';

        const div = document.createElement('div');
        div.className = 'news-item bg-gray-800 p-6 rounded-2xl border border-gray-700 hover:border-emerald-500 flex gap-6';
        div.innerHTML = `
          <div class="text-emerald-400 font-mono text-sm pt-1 w-28 shrink-0">${date}</div>
          <div class="flex-1">
            <a href="${url}" target="_blank" rel="noopener"
               class="block text-2xl font-semibold leading-tight hover:text-emerald-300 transition-colors">
              ${title}
            </a>
            <div class="mt-6 flex justify-end">
              <a href="${url}" target="_blank" rel="noopener"
                 class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-1">
                Read full article →
              </a>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
