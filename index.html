<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Voynich Times</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js?v=0423am"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; }
    .central-image {
      max-width: 620px;
      border: 8px solid #334155;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    .side-card {
      transition: all 0.3s ease;
      padding: 12px 16px;
    }
    .side-card:hover {
      transform: scale(1.03) translateY(-3px);
      box-shadow: 0 15px 20px -5px rgb(0 0 0 / 0.2);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 p-4 sticky top-0 shadow">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">The Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-8 text-center">
    <h1 class="text-6xl font-bold leading-none mb-4">The Voynich Times</h1>
    <p class="text-2xl text-gray-300 max-w-xl mx-auto">
      Bringing mysterious puzzly news to you!
    </p>

    <!-- Centered image -->
    <div class="flex justify-center mt-16 mb-12">
      <img src="voynich-home-art.jpg" 
           alt="Voynich-inspired Art Nouveau illustration"
           class="central-image">
    </div>

    <!-- Two columns side-by-side -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
      
      <!-- LEFT: New Products -->
      <div>
        <h3 class="text-xl font-semibold mb-6 text-emerald-300">New Products</h3>
        <div id="recent-products" class="space-y-3"></div>
      </div>

      <!-- RIGHT: Latest News -->
      <div>
        <h3 class="text-xl font-semibold mb-6 text-emerald-300">Latest News</h3>
        <div id="recent-news" class="space-y-3"></div>
      </div>
    </div>

    <!-- Patreon -->
    <div class="mt-20">
      <a href="https://patreon.com/Brentp256" target="_blank"
         class="inline-flex items-center gap-3 bg-emerald-700 hover:bg-emerald-600 px-10 py-5 rounded-3xl text-xl font-medium transition-colors">
        Support The Voynich Times!
        <span class="text-3xl">❤️</span>
      </a>
    </div>
  </div>

  <!-- Tiny version indicator -->
  <div class="fixed bottom-4 right-4 text-[10px] text-gray-600 bg-gray-900/70 px-2 py-px rounded">
    v0423am
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log("🚀 v0423am — Centered image + left products + right news (8 newest each)");

      const productsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=2126428328&single=true&output=csv";
      const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";

      const products = await loadCSV(productsCSV);
      const newsData = await loadCSV(newsCSV);

      const dateSorter = (a, b) => {
        const parseDate = (val) => {
          if (!val) return 0;
          const parts = String(val).split('/');
          if (parts.length === 3) return new Date(parts[2], parts[0] - 1, parts[1]).getTime();
          return new Date(val).getTime();
        };
        return parseDate(b) - parseDate(a);
      };

      // LEFT: 8 newest products
      const recentProducts = [...products].sort(dateSorter).slice(0, 8);
      const prodContainer = document.getElementById('recent-products');
      recentProducts.forEach(item => {
        const name = item.Product || 'Untitled Product';
        const url = item.URL || '#';
        const div = document.createElement('div');
        div.className = 'side-card bg-gray-800 p-4 rounded-2xl border border-gray-600 hover:border-emerald-400 text-base';
        div.innerHTML = `
          <a href="${url}" target="_blank" rel="noopener" class="block font-medium hover:text-emerald-300">
            New Product: ${name}
          </a>
        `;
        prodContainer.appendChild(div);
      });

      // RIGHT: 8 newest news
      const recentNews = [...newsData].sort(dateSorter).slice(0, 8);
      const newsContainer = document.getElementById('recent-news');
      recentNews.forEach(item => {
        const title = item.Title || 'Untitled';
        const url = item.URL || '#';
        const div = document.createElement('div');
        div.className = 'side-card bg-gray-800 p-4 rounded-2xl border border-gray-600 hover:border-emerald-400 text-base';
        div.innerHTML = `
          <a href="${url}" target="_blank" rel="noopener" class="block font-medium hover:text-emerald-300">
            ${title}
          </a>
        `;
        newsContainer.appendChild(div);
      });
    });
  </script>
</body>
</html>
