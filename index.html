<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Self-Proclaimed Leader in Mystery Puzzle News! Latest Voynich manuscript updates, escape room puzzles, cipher challenges, and strange artifact discoveries.">
  <title>The Voynich Times</title>
  
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MFDQCDM28S"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MFDQCDM28S');
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen overflow-x-hidden">
  
  <!-- Static background image -->
  <div id="background-image" 
       style="position:fixed; top:0; left:0; width:100%; height:100%; 
              background-image: url('voynich-home-art.jpg'); 
              background-size: cover; background-position: center; 
              z-index:-2; filter:brightness(0.75) contrast(1.05);">
  </div>
  
  <div class="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.68); z-index:-1;"></div>

  <!-- Navigation -->
  <nav class="bg-gray-800 p-4 sticky top-0 shadow z-50">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">The Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6 pt-12">
    <div class="title-box mx-auto text-center">
      <h1 class="text-5xl font-bold tracking-tight">The Voynich Times</h1>
      <p class="text-xl mt-2 text-emerald-300">The Self-Proclaimed Leader in Mystery Puzzle News!</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-16">
      <!-- Recent Products -->
      <div>
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <span>🧪</span> Recent Products
        </h2>
        <div id="recent-products" class="space-y-3"></div>
      </div>

      <!-- Latest News -->
      <div>
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <span>📰</span> Latest News
        </h2>
        <div id="recent-news" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- Amazon disclaimer footer -->
  <footer class="mt-auto py-8 text-center text-sm text-gray-400 border-t border-gray-700">
    <div class="max-w-screen-2xl mx-auto px-6">
      <p>As an Amazon Associate I earn from qualifying purchases.</p>
      <p class="mt-2 text-xs">v0428 — Updated April 28, 2026</p>
    </div>
  </footer>

  <!-- Scripts at bottom for best performance -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <script>
    // Tailwind script initialization
    tailwind.config = { content: ["./**/*.html"] };

    // Card styling (bubbles restored)
    const style = document.createElement('style');
    style.innerHTML = `
      .news-pepper {
        transition: all 0.3s ease;
        background: rgba(31, 41, 55, 0.9);
        border: 1px solid #4b5563;
      }
      .news-pepper:hover {
        transform: scale(1.05) translateY(-4px);
        border-color: #10b981;
      }
      .product-card {
        transition: all 0.3s ease;
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid #34d399;
      }
      .product-card:hover {
        transform: scale(1.05) translateY(-4px);
        border-color: #10b981;
      }
      .card-date {
        font-size: 0.8rem;
        color: #9ca3af;
        margin-top: 4px;
      }
    `;
    document.head.appendChild(style);

    // Your exact Google Sheets URLs with cache-busting
    const productsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=2126428328&single=true&output=csv";
    const newsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=1558648992&single=true&output=csv";

    async function loadCSV(url) {
      const cacheBuster = `&t=${Date.now()}`;
      const response = await fetch(url + cacheBuster);
      const text = await response.text();
      return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    // More robust date sorter (handles MM/DD/YYYY and other common formats)
    const dateSorter = (a, b) => {
      const parseDate = (str) => {
        if (!str) return new Date(0);
        // Try MM/DD/YYYY first
        let date = new Date(str);
        if (!isNaN(date.getTime())) return date;
        // Fallback: split MM/DD/YYYY
        const parts = str.split('/');
        if (parts.length === 3) {
          const [month, day, year] = parts.map(Number);
          return new Date(year, month - 1, day);
        }
        return new Date(0);
      };
      return parseDate(b.Date) - parseDate(a.Date);
    };

    async function init() {
      try {
        const [products, newsData] = await Promise.all([
          loadCSV(productsCSV),
          loadCSV(newsCSV)
        ]);

        // Recent Products - newest first, now 18 items
        const recentProducts = [...products].sort(dateSorter).slice(0, 18);
        const prodContainer = document.getElementById('recent-products');
        recentProducts.forEach(item => {
          const div = document.createElement('div');
          div.className = 'product-card p-4 rounded-2xl text-sm';
          div.innerHTML = `
            <a href="${item.URL || '#'}" target="_blank" rel="noopener" class="block font-medium hover:text-emerald-300">
              ${item.Product || 'Untitled'}
            </a>
            <div class="card-date">(${item.Date || ''})</div>
          `;
          prodContainer.appendChild(div);
        });

        // Latest News - newest first, now 18 items
        const recentNews = [...newsData].sort(dateSorter).slice(0, 18);
        const newsContainer = document.getElementById('recent-news');
        recentNews.forEach(item => {
          const div = document.createElement('div');
          div.className = 'news-pepper p-4 rounded-2xl text-sm';
          div.innerHTML = `
            <a href="${item.URL || '#'}" target="_blank" rel="noopener" class="block hover:text-emerald-300">
              ${item.Title || 'Untitled'}
            </a>
            <div class="card-date">(${item.Date || ''})</div>
          `;
          newsContainer.appendChild(div);
        });
      } catch (e) {
        console.error("Failed to load Google Sheets data:", e);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
