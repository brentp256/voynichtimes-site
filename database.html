<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voynich Times - Full Database</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 p-4 sticky top-0 shadow">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">Full Product Database</h2>
    <div id="product-table" class="bg-gray-800 p-4 rounded-xl"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log("🚀 Minimal test script running");

      new Tabulator("#product-table", {
        data: [
          { Company: "Test Row 1", Product: "This is a test row", Date: "4/9/2026", Notes: "If you see this row, Tabulator is working" },
          { Company: "Test Row 2", Product: "Second test row", Date: "4/8/2026", Notes: "Debug mode active" }
        ],
        layout: "fitDataTable",
        pagination: "local",
        paginationSize: 10,
        columns: [
          { title: "Company", field: "Company" },
          { title: "Product", field: "Product" },
          { title: "Date", field: "Date" },
          { title: "Notes", field: "Notes" }
        ]
      });
    });
  </script>
</body>
</html>
