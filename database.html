<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Product Database - The Voynich Times</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; overflow-x: hidden; }
   
    #background-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75) contrast(1.05);
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.68);
      z-index: -1;
    }
    .product-card {
      transition: all 0.3s ease;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #34d399;
      border-radius: 16px;
    }
    .product-card:hover {
      transform: scale(1.03) translateY(-2px);
      border-color: #10b981;
    }
    .card-date {
      font-size: 0.75rem;
      font-style: italic;
      color: #9ca3af;
      margin-top: 6px;
      opacity: 0.85;
    }
  </style>
  <link rel="canonical" href="https://voynichtimes.com/database.html" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <!-- Video deferred until data loads -->
  <video id="background-video" 
         loop 
         muted 
         playsinline 
         poster="voynich-home-art.jpg"
         preload="none">
    <source src="voynich-flip.webm" type="video/webm">
    <source src="voynich-flip.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <!-- Clean header/nav -->
  <nav class="bg-gray-800/90 backdrop-blur-md p-4 sticky top-0 shadow z-50">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold hover:text-emerald-400 transition-colors">The Voynich Times</a>
      
      <div class="hidden md:flex items-center space-x-8 text-sm">
        <a href="index.html" class="text-gray-300 hover:text-white transition-colors">Home</a>
        <a href="news.html" class="text-gray-300 hover:text-white transition-colors">News</a>
        <a href="database.html" class="text-gray-300 hover:text-white transition-colors">Full Database</a>
        <a href="/wunderkammer/" class="text-gray-300 hover:text-white transition-colors">Wunderkammer</a>
      </div>
      
      <button class="md:hidden text-gray-300 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-8">Full Product Database</h1>
    <div id="database-container" class="space-y-4"></div>
  </div>

  <!-- Amazon disclaimer at bottom -->
  <div class="max-w-screen-2xl mx-auto px-8 py-12 text-center text-gray-400 text-sm border-t border-gray-700">
    All links lead to their original sources. Amazon links are affiliate links that help support The Voynich Times at no extra cost to you.
  </div>

  <!-- Version -->
  <div class="fixed bottom-4 right-4 text-[10px] text-gray-400 bg-black/70 px-2 py-px rounded z-50">
    v0423-dates
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const productsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=2126428328&single=true&output=csv";
      const products = await loadCSV(productsCSV);
      const container = document.getElementById('database-container');

      products.forEach(item => {
        const div = document.createElement('div');
        div.className = 'product-card p-6';
        div.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <a href="${item.URL || '#'}" target="_blank" rel="noopener" class="block font-medium hover:text-emerald-300 text-lg">
                ${item.Product || 'Untitled'}
              </a>
              <div class="text-emerald-300 text-sm">${item.Company || ''} • ${item.Series || ''}</div>
            </div>
            <div class="text-right">
              <div class="card-date">${item.Date || ''}</div>
              <div class="text-xs text-gray-400 mt-1">${item.Category || ''}</div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });

      const video = document.getElementById('background-video');
      if (video) video.play();
    });
  </script>
</body>
</html>
