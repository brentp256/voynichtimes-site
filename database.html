<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voynich Times - Full Database</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { background-color: #111827; color: #e5e7eb; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 p-4 sticky top-0 shadow">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Voynich Times</h1>
      <div class="space-x-6">
        <a href="index.html" class="hover:text-white">Home</a>
        <a href="news.html" class="hover:text-white">News</a>
        <a href="database.html" class="hover:text-white">Full Database</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">Full Product Database</h2>
    
    <!-- VERSION BANNER -->
    <div class="bg-emerald-600 text-white text-center py-2 text-sm font-medium mb-6 rounded-xl">
      v0422d — Notes width: 240px
    </div>

    <div id="product-table" class="bg-gray-800 p-4 rounded-xl"></div>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log("🚀 v0422d — Notes width: 240px");

      const productsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=2126428328&single=true&output=csv";
      const productNameColumn = "Product";

      const data = await loadCSV(productsCSV);

      const dateSorter = function(a, b) {
        const parseDate = (val) => {
          if (!val) return 0;
          const parts = String(val).split('/');
          if (parts.length === 3) {
            return new Date(parts[2], parts[0] - 1, parts[1]).getTime();
          }
          return new Date(val).getTime();
        };
        return parseDate(a) - parseDate(b);
      };

      new Tabulator("#product-table", {
        data: data,
        layout: "fitDataTable",
        pagination: "local",
        paginationSize: 100,
        paginationSizeSelector: [25, 50, 100, 250],
        variableHeight: true,
        columns: [
          { title: "Company", field: "!Company", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          { title: "Series", field: "Series", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          {
            title: "Product",
            field: productNameColumn,
            formatter: function(cell) {
              const value = cell.getValue();
              const rowData = cell.getRow().getData();
              const url = rowData["URL"];
              if (url) {
                return `<a href="${url}" target="_blank" rel="noopener" class="text-blue-400 hover:text-blue-300 underline hover:no-underline cursor-pointer">${value}</a>`;
              }
              return value;
            },
            widthGrow: 1.2,
            headerFilter: true
          },
          { title: "Category", field: "Category", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          { title: "Date", field: "Date", sorter: dateSorter, headerFilter: true, widthGrow: 1 },
          { 
            title: "Notes", 
            field: "Notes", 
            headerFilter: true,
            formatter: "textarea",
            width: 240,      // widened to reach the end of the green banner
            minWidth: 120
          },
          { title: "URL", field: "URL", visible: false }
        ],
        initialSort: [{column: "Date", dir: "desc"}]
      });
    });
  </script>
</body>
</html>
