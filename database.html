      position: fixed;

</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <!-- Video background (deferred) -->
  <video id="background-video" loop muted playsinline poster="voynich-home-art.jpg" preload="none">
    <source src="voynich-flip.webm" type="video/webm">
    <source src="voynich-flip.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <!-- Clean modern nav -->
  <nav class="bg-gray-800/90 backdrop-blur-md p-4 sticky top-0 shadow z-50">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold hover:text-emerald-400 transition-colors">The Voynich Times</a>
      
      <div class="hidden md:flex items-center space-x-8 text-sm">
        <a href="index.html" class="text-gray-300 hover:text-white transition-colors">Home</a>
        <a href="news.html" class="text-gray-300 hover:text-white transition-colors">News</a>
        <a href="database.html" class="text-gray-300 hover:text-white transition-colors">Full Database</a>
        <a href="/wunderkammer/" class="text-gray-300 hover:text-white transition-colors">Wunderkammer</a>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">Full Product Database</h2>
    <div id="product-table" class="bg-gray-800 p-4 rounded-xl"></div>
  </div>

  <!-- Amazon disclaimer at bottom -->
  <div class="max-w-screen-2xl mx-auto px-8 py-12 text-center text-gray-400 text-sm border-t border-gray-700">
    All links lead to their original sources. Amazon links are affiliate links that help support The Voynich Times at no extra cost to you.
  </div>

  <!-- Version indicator -->
  <div class="fixed bottom-4 right-4 text-[10px] text-gray-600 bg-gray-900/70 px-2 py-px rounded">
    v0423o
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log("🚀 v0423o — Database page");
      const productsCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvQIPJY_NAtPe1A9GUQkf5d1Jw6HoH79OMcTQMB20MtnlUv3DfRa_-Q_7nGTNt-gxnpQSCPuD5ZU7S/pub?gid=2126428328&single=true&output=csv";
      const productNameColumn = "Product";
      const data = await loadCSV(productsCSV);
      const dateSorter = function(a, b) {
        const parseDate = (val) => {
          if (!val) return 0;
          const parts = String(val).split('/');
          if (parts.length === 3) {
            return new Date(parts[2], parts[0] - 1, parts[1]).getTime();
          }
          return new Date(val).getTime();
        };
        return parseDate(a) - parseDate(b);
      };
      new Tabulator("#product-table", {
        data: data,
        layout: "fitDataTable",
        pagination: "local",
        paginationSize: 100,
        paginationSizeSelector: [25, 50, 100, 250],
        variableHeight: true,
        columns: [
          { title: "Company", field: "!Company", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          { title: "Series", field: "Series", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          {
            title: "Product",
            field: productNameColumn,
            formatter: function(cell) {
              const value = cell.getValue();
              const rowData = cell.getRow().getData();
              const url = rowData["URL"];
              if (url) {
                return `<a href="${url}" target="_blank" rel="noopener" class="text-blue-400 hover:text-blue-300 underline hover:no-underline cursor-pointer">${value}</a>`;
              }
              return value;
            },
            widthGrow: 1.2,
            headerFilter: true
          },
          { title: "Category", field: "Category", headerFilter: true, formatter: "textarea", widthGrow: 1 },
          { title: "Date", field: "Date", sorter: dateSorter, headerFilter: true, widthGrow: 1 },
          {
            title: "Notes",
            field: "Notes",
            headerFilter: true,
            formatter: "textarea",
            width: 280,
            minWidth: 120
          },
          { title: "URL", field: "URL", visible: false }
        ],
        initialSort: [{column: "Date", dir: "desc"}]
      });

      // Start video after table loads
      const video = document.getElementById('background-video');
      if (video) video.play();
    });
  </script>
</body>
</html>
